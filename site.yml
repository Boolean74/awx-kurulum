---
- name: "M-Cloud GPU Provisioning"
  hosts: all
  gather_facts: no

  tasks:
    # KOLEKSİYONU BURADA ZORLA KURDURUYORUZ
    - name: "Docker Koleksiyonunu Manuel Yukle"
      delegate_to: localhost
      command: ansible-galaxy collection install community.docker
      ignore_errors: yes

    - name: "FULL VM Baslatiliyor"
      community.docker.docker_container:
        name: "mcloud_full_{{ 9999 | random }}"
        image: "dorowu/ubuntu-desktop-lxde-vnc"
        state: started
        published_ports:
          - "30500:80"
      when: user_choice == 'full_vm'
