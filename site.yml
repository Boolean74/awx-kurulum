---
- name: "M-Cloud VNC Provisioning"
  hosts: all 
  gather_facts: no
  vars:
    user_choice: "full_vm"
    vnc_password: "password123"

  tasks:
    - name: "DESKTOP: Webtop XFCE Kuruluyor"
      community.docker.docker_container:
        name: "mcloud_desktop"
        image: "lscr.io/linuxserver/webtop:ubuntu-xfce"
        state: started
        restart_policy: always
        shm_size: "1g"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/Istanbul"
          PASSWORD: "{{ vnc_password }}"
          TITLE: "M-Cloud"
          NO_HTTPS: "true"
        published_ports:
          - "30500:3001"
        volumes:
          - "/mnt/depo/webtop:/config"
      when: user_choice == 'full_vm'

    - name: "LIGHT: Ubuntu Container"
      community.docker.docker_container:
        name: "mcloud_light_{{ now().strftime('%Y%m%d%H%M%S') }}"
        image: "arm64v8/ubuntu:latest"
        state: started
        restart_policy: unless-stopped
        command: sleep infinity
      when: user_choice == 'light_container'

    - name: "Sonuc"
      debug:
        msg: "{{ user_choice }} basariyla basladi."
