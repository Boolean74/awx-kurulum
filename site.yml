---
- name: "M-Cloud GPU Provisioning"
  hosts: all
  gather_facts: no

  vars:
    # Rastgele port seçimi
    dynamic_port: "{{ range(30000, 31000) | random }}"
    # Kullanıcı adındaki geçersiz karakterleri temizle
    safe_owner: "{{ owner | default('Mehmet_User') | regex_replace('[^a-zA-Z0-9]', '_') }}"

  tasks:
    - name: "Docker Konteynerını Başlat (Full VM)"
      community.docker.docker_container:
        name: "mcloud_{{ safe_owner }}_{{ dynamic_port }}"
        image: "dorowu/ubuntu-desktop-lxde-vnc"
        state: started
        published_ports:
          - "{{ dynamic_port }}:80"
      when: user_choice == 'full_vm'

    - name: "Docker Konteynerını Başlat (Light)"
      community.docker.docker_container:
        name: "mcloud_light_{{ safe_owner }}_{{ dynamic_port }}"
        image: "ubuntu:latest"
        state: started
        command: sleep infinity
        published_ports:
          - "{{ dynamic_port }}:22"
      when: user_choice == 'light_container'
